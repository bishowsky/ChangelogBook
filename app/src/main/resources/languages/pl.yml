# Komenda info - w pełni customizowalna lista linii
# Użyj "" dla pustych linii, dodawaj/usuwaj/przestawiaj linie jak chcesz
# Dostępne placeholdery: %pluginversion%, %servertype%, %serverversion%, %servername%,
#                         %updatenotifier%, %database%, %databasetype%, %databasesync%
info:
  - "&8&m====================&r"
  - ""
  - "&6Nazwa serwera: &e%servername%"
  - "&6Wersja pluginu: &e%pluginversion%"
  - "&6Typ serwera: &e%servertype%"
  - "&6Wersja serwera: &e%serverversion%"
  - ""
  - "&6Sprawdzanie aktualizacji: &e%updatenotifier%"
  - "&6Baza danych: &e%database%"
  - "&6Typ bazy danych: &e%databasetype%"
  - "&6Synchronizacja bazy: &e%databasesync% &7(planowane)"
  - ""
  - "&b&lUprawnienia:"
  - "&7- &echangelogbook.use &7(przeglądanie)"
  - "&7- &echangelogbook.admin &7(zarządzanie)"
  - "&7- &echangelogbook.update.notify &7(powiadomienia)"
  - ""
  - "&8&m====================&r"

