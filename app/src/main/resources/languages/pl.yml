  reload_permission: "&cNie masz uprawnień do przeładowania konfiguracji"
  add_usage: "&cUżycie: /changelog add [custom-id] [kategoria] <treść>"
  edit_usage: "&cUżycie: /changelog edit <id> <treść>"
  delete_usage: "&cUżycie: /changelog delete <id>"
  give_usage: "&cUżycie: /changelog give <gracz> <typNagrody>"

