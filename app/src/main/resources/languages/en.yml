# Info command - fully customizable line list
# Use "" for empty lines, add/remove/reorder lines as needed
# Available placeholders: %pluginversion%, %servertype%, %serverversion%, %servername%,
#                         %updatenotifier%, %database%, %databasetype%, %databasesync%
info:
  - "&8&m====================&r"
  - ""
  - "&6Server name: &e%servername%"
  - "&6Plugin version: &e%pluginversion%"
  - "&6Server type: &e%servertype%"
  - "&6Server version: &e%serverversion%"
  - ""
  - "&6Update notifier: &e%updatenotifier%"
  - "&6Database: &e%database%"
  - "&6Database type: &e%databasetype%"
  - "&6Database sync: &e%databasesync% &7(planned)"
  - ""
  - "&b&lPermissions:"
  - "&7- &echangelogbook.use &7(view changelog)"
  - "&7- &echangelogbook.admin &7(manage)"
  - "&7- &echangelogbook.update.notify &7(updates)"
  - ""
  - "&8&m====================&r"

