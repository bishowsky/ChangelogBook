# ChangelogBook Configuration

# Config version - used internally for auto-migration, do not change manually.
config-version: 2

# Server name displayed in /changelog info command
server-name: "My Server"

# Language: en (English) or pl (Polish)
language: "en"

# Delay time (in ticks) before showing the notification after joining (60 = 3 seconds)
notification-delay: 60

# Auto-open changelog book on player join
auto-open:
  # Enable automatic opening of changelog book when players join
  enabled: false
  # Delay in seconds before opening the book (e.g., 3 = wait 3 seconds after join)
  delay-seconds: 3

# Category System - fully customizable categories for changelog entries
# Usage: /changelog add [category] <content>
# Example: /changelog add fix Fixed critical bug
# 
# You can create unlimited custom categories with any ID you want!
# Each category can have:
#   - name: Display name shown in Discord and messages
#   - icon: Emoji or symbol shown in book
#   - color: Minecraft color code (&a, &e, &c, etc.) for book display
#   - enabled: Set to false to disable the category
#
# Discord embed colors are configured in discord.yml (category-colors section).
#
# Built-in categories (can be customized or removed):
categories:
  fix:
    name: "Fixed"
    icon: "✔"
    color: "&6"  # Gold
    enabled: true
  added:
    name: "Added"
    icon: "🟢"
    color: "&a"  # Green
    enabled: true
  removed:
    name: "Removed"
    icon: "➖"
    color: "&c"  # Red
    enabled: true
  # Example custom categories (uncomment to use):
  # event:
  #   name: "Event"
  #   icon: "🎪"
  #   color: "&d"  # Light purple
  #   discord-color: "EB459E"  # Pink
  #   enabled: true
  # security:
  #   name: "Security"
  #   icon: "🔒"
  #   color: "&4"  # Dark red
  #   discord-color: "992D22"  # Dark red
  #   enabled: true
  # performance:
  #   name: "Performance"
  #   icon: "⚡"
  #   color: "&6"  # Gold
  #   discord-color: "F1C40F"  # Yellow-gold
  #   enabled: true

# First Page Customization - customize the first page of the changelog book
first-page:
  title: "⚒ Changelog ⚒"
  separator: "━━━━━━━━━━━━━━━━━━"
  description: "Server changelog"
  footer: "Scroll to view changes"

# MySQL Database Configuration
mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: minecraft
  username: root
  password: "change_me"
  table-prefix: changelog_
  # HikariCP Connection Pool Settings
  pool:
    maximum-size: 10           # Maximum number of connections in pool
    minimum-idle: 2            # Minimum number of idle connections
    connection-timeout: 10000  # Connection timeout in milliseconds
    idle-timeout: 600000       # Idle timeout (10 minutes)
    max-lifetime: 1800000      # Max connection lifetime (30 minutes)
  # Multi-server database synchronization
  # When enabled with MySQL, all servers sharing the same database will see the same changelog
  # Perfect for networks with multiple servers (lobby, smp, creative, etc.)
  # Requirements:
  #   1. MySQL must be enabled (mysql.enabled: true)
  #   2. All servers must use the same database and table-prefix
  #   3. All servers should have similar plugin configuration
  # How it works:
  #   - All changelog entries are stored in shared MySQL database
  #   - All servers read from and write to the same tables
  #   - Changes made on any server are instantly visible on all other servers
  sync: true

# Database Maintenance
database:
  # Auto-prune soft-deleted entries older than X days
  # 0 = disabled, >0 = enabled
  prune-deleted-after-days: 30
  # Prune on plugin startup (in addition to auto-prune)
  prune-on-startup: true

# Reward System Configuration
rewards:
  enabled: true
  # Reward types - add as many as you want
  types:
    # Bronze reward - basic level
    bronze:
      enabled: true
      chance: 20
      cooldown-hours: 4
      max-days: 7
      # You can use single command (legacy):
      # command: "say %player% received bronze reward!"
      # Or multiple commands (new feature):
      commands:
        - "say %player% received bronze reward!"
        - "give %player% diamond 1"
    # Silver reward - intermediate level
    silver:
      enabled: true
      chance: 10
      cooldown-hours: 8
      max-days: 14
      commands:
        - "say %player% received silver reward!"
        - "give %player% emerald 5"
        - "bc &6%player% &eotrzymał nagrodę srebrną!"
    # Gold reward - premium level
    gold:
      enabled: true
      chance: 5
      cooldown-hours: 12
      max-days: 30
      commands:
        - "say %player% received gold reward!"
        - "give %player% diamond 10"
        - "bc &6%player% &eotrzymał nagrodę złotą!"

# Discord Integration Configuration
discord:
  # Enable Discord webhook notifications
  enabled: false
  # Discord webhook URL (get from Server Settings -> Integrations -> Webhooks)
  webhook-url: "https://discord.com/api/webhooks/..."
  # Notify when new changelog entry is added
  notify-on-add: true
  # Notify when a player submits a new suggestion
  notify-on-suggestion: true
  # Mention a role when posting (e.g., "@everyone", "@here", "<@&ROLE_ID>", or "none")
  mention-role: "none"

# Update Checker Configuration
update-checker:
  # Enable checking for plugin updates from GitHub
  enabled: true
  # How often to check for updates (in hours)
  check-interval-hours: 6
  # GitHub repository in format "owner/repo"
  github-repo: "bishowsky/ChangelogBook"
  # Notify players with permission on join
  notify-on-join: true

# Content Validation Limits
limits:
  # Maximum changelog entry length (characters)
  max-content-length: 5000
  # Minimum changelog entry length (characters)
  min-content-length: 3

# Auto-category detection
category-detection:
  enabled: false
  min-matches: 2
  keywords:
    fix:
      - "fix"
      - "fixed"
      - "bug"
      - "issue"
      - "problem"
      - "error"
    added:
      - "add"
      - "added"
      - "new"
      - "feature"
      - "implement"
    removed:
      - "remove"
      - "removed"
      - "delete"
      - "deprecated"

# Backup system
backup:
  enabled: true
  interval-hours: 24
  retention-days: 30

# Scheduled entries
scheduled-entries:
  enabled: true
  check-interval: 60

# Analytics
analytics:
  enabled: true
  save-interval: 300

# RSS Feed
rss:
  enabled: false
  title: "Server Changelog"
  description: "Latest updates and changes"
  link: "https://example.com"
  output-path: "changelog.xml"
  max-entries: 50

# Notifications (Title, ActionBar, BossBar)
notifications:
  enabled: true
  type: "actionbar"
  actionbar:
    text: "&6New changelog: &f%category%"
  title:
    text: "&6New Changelog!"
    subtitle: "&7Category: %category%"
  bossbar:
    text: "&6New Changelog Entry"
    color: "BLUE"
    duration: 10
  # Sound played when notifying players about a new changelog entry
  sound:
    enabled: false
    # Valid sound names: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html
    name: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.0

# Debug mode - set to true for verbose logging
debug: false